services:
  api:
    build: ./api
    ports:
      - "8787:8000"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - rbi

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "5174:80"
    depends_on:
      - api
    networks:
      - rbi

networks:
  rbi:
    name: rbi_net
